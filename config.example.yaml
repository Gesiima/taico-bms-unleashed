# ── V-KING / TAICO BMS logger configuration ────────────────────────────────
# Copy this file to  config.yaml  and adjust the values.

poll_interval: 1          # wie oft das BMS abgefragt wird (Frische-Basis, kleinster Wert)
live_interval: 1          # Dashboard-Aktualisierung   (>= poll_interval)
mqtt_interval: 5          # MQTT-Publish-Takt          (>= poll_interval)
db_interval: 10           # Schreiben in SQLite/CSV    (>= poll_interval)
offline_after: 3          # nach N Fehlversuchen gilt ein BMS als offline
cell_alert_mv: 3600       # Zellen >= diesem Wert (mV) werden hervorgehoben (0 = aus)
cell_scale_min_mv: 2500   # feste Zellbalken-Skala: Untergrenze (mV)
cell_scale_max_mv: 3650   # feste Zellbalken-Skala: Obergrenze (mV)
log_level: INFO           # Konsole/Journal: DEBUG | INFO | WARNING | ERROR

# Optionale Logdatei (taegliche Rotation). Faengt ausfuehrliches DEBUG/Rohframes ab,
# ohne das systemd-Journal aufzublaehen (Journal bleibt bei log_level = INFO schlank).
log_file:
  enabled: false          # true = zusaetzlich in Datei schreiben
  path: data/logs/vkbms.log
  level: DEBUG            # Ebene der Datei (unabhaengig von log_level)
  retention_days: 2       # Anzahl taeglicher Dateien, die behalten werden

# Setzt erhoehtes Logging (globales DEBUG oder pro-Bus DEBUG/Rohframes) nach X Minuten
# automatisch auf INFO zurueck. Nur zur Laufzeit -- diese Datei wird nicht veraendert.
debug_auto_reset:
  enabled: false
  minutes: 30

# Web dashboard (run_web.py)
web:
  host: 0.0.0.0           # 0.0.0.0 = auch im Netz erreichbar; 127.0.0.1 = nur lokal
  port: 8080              # http://localhost:8080
  access_log: false       # HTTP-Zugriffslogs (GET ... 200) ausblenden (true zum Debuggen)
  # Optionale Zugriffsbeschraenkung nach Quell-Netz (App-Schicht; robuster bleibt
  # systemd IPAddressAllow bzw. Firewall/WAF). Leer = keine Einschraenkung.
  allow_networks: []      # z. B. [192.168.2.0/24]; localhost ist immer erlaubt
  trusted_proxies: []     # nur von diesen IPs/Netzen wird X-Forwarded-For ausgewertet
  #                       # (z. B. die interne IP der Sophos XGS WAF)

# One or more buses. A bus = one connection carrying one or more pack addresses.
# main_address = the directly-wired pack (required, exactly one) -- only this pack can
# Power Off. sub_addresses = further packs reached over the address bus (optional, many).
buses:
  - name: main
    connection:
      type: tcp           # "tcp" (gateway) or "serial" (COM port)
      host: 192.168.1.50  # <-- IP of your RS232/485-Ethernet gateway
      port: 9999          # netport1 -> Uart 1 (TCP Server). Max Accept = 1!
    main_address: 1       # directly-wired pack (required) -> Power Off only here
    sub_addresses: [2]    # optional further packs on the same line (e.g. [2, 3])
    read_status: true     # also poll the status/alarm block (CID2 44)
    timeout: 1.0
    # Per-bus diagnostics (optional):
    # log_level: DEBUG        # override the global level for THIS bus only -> readable
    #                         # one-line-per-request logging (what is sent to / read from BMS)
    # debug_raw_frames: false # additionally dump the full TX/RX frames as hex

  # Example of a local serial port instead of TCP (needs pyserial):
  # - name: usb
  #   connection:
  #     type: serial
  #     port: COM1        # on Linux e.g. /dev/ttyUSB0
  #     baudrate: 9600
  #   main_address: 1

output:
  sqlite:
    enabled: true
    path: data/bms.db     # WAL-mode SQLite, one row per reading
    retention_days: 0     # 0 = unbegrenzt; sonst taegliches Loeschen aelterer Zeilen

  csv:
    enabled: false
    dir: data/csv         # one file per pack: pack1.csv, pack2.csv

  mqtt:
    enabled: true
    host: 192.168.1.10    # <-- your MQTT broker
    port: 1883
    base_topic: bms       # topics like bms/pack1/voltage_v, bms/pack1/cells/01, bms/status
    username:             # optional
    password:            # optional
    publish_cells: true       # Einzelzellen als bms/packX/cells/01..16
    publish_state_json: false # zusätzliches Gesamt-JSON-Topic bms/packX/state
