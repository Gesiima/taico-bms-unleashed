<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VK BMS · Leitstand</title>
<style>
  :root{
    --bg:#0c1416; --panel:#11201e; --panel2:#0f1b1a; --line:#223834;
    --text:#e9f1ef; --muted:#7e9893; --dim:#56706c;
    --charge:#46d6a0; --discharge:#f4a648; --idle:#6fa0c4;
    --cmin:#4aa6e4; --cmax:#ec6f6f; --cmid:#2f6f66;
    --alarm:#ff5d5d;
    --mono:"Consolas","SFMono-Regular",ui-monospace,"Liberation Mono",monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans)}
  body{padding:0 0 48px}
  a{color:inherit}

  header{
    position:sticky;top:0;z-index:5;background:linear-gradient(180deg,#0d1719,#0c1416);
    border-bottom:1px solid var(--line);padding:14px 22px;
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  }
  .brand{font-weight:600;letter-spacing:.14em;text-transform:uppercase;font-size:14px}
  .brand b{color:var(--charge)}
  nav{display:flex;gap:4px;margin-left:8px}
  nav a{font-size:12.5px;letter-spacing:.06em;padding:6px 12px;border-radius:6px;color:var(--muted);text-decoration:none}
  nav a.active{background:var(--panel);color:var(--text)}
  nav a.soon{color:var(--dim);cursor:not-allowed}
  nav a.soon::after{content:" · bald";color:var(--dim);font-size:10px}
  .status{margin-left:auto;display:flex;align-items:center;gap:10px;font:12.5px/1 var(--mono);color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--dim);box-shadow:0 0 0 0 transparent}
  .dot.live{background:var(--charge);box-shadow:0 0 10px 1px #46d6a060}
  .dot.stale{background:var(--discharge)}
  .dot.down{background:var(--alarm)}
  .ver{font:11px var(--mono);color:var(--dim);padding-left:10px;border-left:1px solid var(--line)}

  main{max-width:1180px;margin:22px auto;padding:0 18px;display:grid;gap:18px}
  .empty{color:var(--muted);font:13px var(--mono);padding:60px;text-align:center;border:1px dashed var(--line);border-radius:12px}

  .pack{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .pack.alarm{border-color:var(--alarm);box-shadow:0 0 0 1px #ff5d5d40}
  .ptop{display:flex;align-items:center;gap:16px;padding:16px 20px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .pid{font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:13px;color:var(--muted)}
  .pid b{color:var(--text);font-size:16px;margin-left:6px}
  .badge{font:11px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:20px;border:1px solid currentColor}
  .badge.charge{color:var(--charge)} .badge.discharge{color:var(--discharge)} .badge.idle{color:var(--idle)}
  .badge.warn{color:var(--alarm);border-color:var(--alarm)}
  .soc{margin-left:auto;text-align:right}
  .soc .v{font:600 30px/1 var(--mono)} .soc .l{font:11px var(--mono);color:var(--muted);letter-spacing:.1em}

  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:1px;background:var(--line)}
  .m{background:var(--panel2);padding:13px 16px}
  .m .l{font:10.5px var(--mono);letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
  .m .v{font:600 20px/1.1 var(--mono);margin-top:5px}
  .m .v small{font-size:12px;color:var(--muted);font-weight:400;margin-left:3px}
  .v.charge{color:var(--charge)} .v.discharge{color:var(--discharge)}

  /* signature: cell balance strip */
  .cells{padding:18px 20px}
  .cells-head{display:flex;align-items:baseline;gap:14px;margin-bottom:14px}
  .cells-head .t{font:11px var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .cells-head .spread{font:12px var(--mono);color:var(--muted)}
  .cells-head .spread b{color:var(--text)}
  .strip{display:grid;grid-template-columns:repeat(16,1fr);gap:6px;align-items:end;height:130px}
  @media(max-width:620px){.strip{grid-template-columns:repeat(8,1fr);height:auto;grid-auto-rows:64px}}
  .cell{position:relative;height:100%;display:flex;flex-direction:column;justify-content:flex-end;
        background:#0a1211;border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .cell .bar{background:var(--cmid);width:100%;transition:height .4s ease}
  .cell.min .bar{background:var(--cmin)} .cell.max .bar{background:var(--cmax)}
  .cell .mv{position:absolute;top:5px;left:0;right:0;text-align:center;font:10px var(--mono);color:var(--text)}
  .cell .ix{position:absolute;bottom:3px;left:0;right:0;text-align:center;font:9px var(--mono);color:var(--dim)}

  .temps{display:flex;flex-wrap:wrap;gap:1px;background:var(--line);border-top:1px solid var(--line)}
  .temps .tt{background:var(--panel2);padding:11px 16px;flex:1;min-width:90px}
  .temps .tt .l{font:10px var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .temps .tt .v{font:600 17px/1 var(--mono);margin-top:4px}
</style>
</head>
<body>
<header>
  <div class="brand">VK&nbsp;<b>BMS</b>&nbsp;Leitstand</div>
  <nav>
    <a class="active" href="#">Monitor</a>
    <a class="soon" title="kommt später">Parameter</a>
    <a class="soon" title="kommt später">MOS</a>
    <a class="soon" title="kommt später">System-Config</a>
  </nav>
  <div class="status"><span id="dot" class="dot"></span><span id="stext">verbinde…</span><span class="ver">{{VERSION}}</span></div>
</header>

<main id="main">
  <div class="empty" id="empty">Warte auf erste Messwerte…</div>
</main>

<script>
const fmt = (n,d=2)=> (n==null||isNaN(n))?"–":Number(n).toFixed(d);
const NAMES = ["cell_t1","cell_t2","cell_t3","cell_t4","env_t","mos_t"];
const TLABEL = {cell_t1:"Zelle 1",cell_t2:"Zelle 2",cell_t3:"Zelle 3",cell_t4:"Zelle 4",env_t:"Umgebung",mos_t:"MOSFET"};

function mode(cur){
  if (cur > 0.3) return ["charge","Laden"];
  if (cur < -0.3) return ["discharge","Entladen"];
  return ["idle","Ruhe"];
}

function packCard(p){
  const cells=[]; for(let i=1;i<=16;i++){const k="v"+String(i).padStart(2,"0"); if(p[k]!=null) cells.push([i,p[k]]);}
  const mvs=cells.map(c=>c[1]); const mn=Math.min(...mvs), mx=Math.max(...mvs);
  const lo=Math.min(mn-15,mn), hi=Math.max(mx+15,mx); const span=Math.max(1,hi-lo);
  const [mc,ml]=mode(p.current_a);

  const strip = cells.map(([i,mv])=>{
    const h=12+Math.round(((mv-lo)/span)*78);
    const cls = mv===mn?"min":(mv===mx?"max":"");
    return `<div class="cell ${cls}"><div class="mv">${mv}</div><div class="bar" style="height:${h}%"></div><div class="ix">${i}</div></div>`;
  }).join("");

  const temps = NAMES.filter(k=>p[k]!=null).map(k=>
    `<div class="tt"><div class="l">${TLABEL[k]}</div><div class="v">${p[k]}&nbsp;°C</div></div>`).join("");

  return `<section class="pack ${p.alarm?'alarm':''}">
    <div class="ptop">
      <div class="pid"><b>${p.source||('Pack '+p.pack)}</b></div>
      <span class="badge ${mc}">${ml}</span>
      ${p.alarm?'<span class="badge warn">Alarm</span>':''}
      <div class="soc"><div class="v">${fmt(p.soc,0)}<small style="font-size:14px;color:var(--muted)">%</small></div><div class="l">SOC</div></div>
    </div>
    <div class="metrics">
      <div class="m"><div class="l">Spannung</div><div class="v">${fmt(p.voltage_v)}<small>V</small></div></div>
      <div class="m"><div class="l">Strom</div><div class="v ${mc}">${p.current_a>0?'+':''}${fmt(p.current_a)}<small>A</small></div></div>
      <div class="m"><div class="l">SOH</div><div class="v">${fmt(p.soh,0)}<small>%</small></div></div>
      <div class="m"><div class="l">Restkapazität</div><div class="v">${fmt(p.remain_ah,1)}<small>Ah</small></div></div>
      <div class="m"><div class="l">Vollladung</div><div class="v">${fmt(p.full_ah,1)}<small>Ah</small></div></div>
      <div class="m"><div class="l">Zyklen</div><div class="v">${fmt(p.cycles,0)}</div></div>
    </div>
    <div class="cells">
      <div class="cells-head">
        <span class="t">Zellspannungen</span>
        <span class="spread">min <b>${mn}</b> · max <b>${mx}</b> · Δ <b>${mx-mn}</b> mV</span>
      </div>
      <div class="strip">${strip}</div>
    </div>
    <div class="temps">${temps}</div>
  </section>`;
}

async function tick(){
  const dot=document.getElementById("dot"), st=document.getElementById("stext");
  try{
    const r=await fetch("/api/state",{cache:"no-store"});
    const s=await r.json();
    const main=document.getElementById("main");
    if(!s.packs || !s.packs.length){
      dot.className="dot "+(s.connected?"live":"down");
      st.textContent=s.error||"keine Daten";
      return;
    }
    main.innerHTML = s.packs.map(packCard).join("");
    dot.className="dot "+(s.connected?"live":"stale");
    st.textContent=(s.connected?"live · ":"veraltet · ")+(s.updated? s.updated.replace("T"," "):"");
  }catch(e){
    dot.className="dot down"; st.textContent="Server nicht erreichbar";
  }
}
tick(); setInterval(tick, 1000);
</script>
</body>
</html>
